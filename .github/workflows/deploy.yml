name: Deploy Vue to Pages

on:
  # 监听 main 分支的 push 事件（如果你的主分支叫 master，请改为 master）
  push:
    branches: ["main"]

  # 允许在 Actions 页面手动触发运行
  workflow_dispatch:

# 设置 GitHub 令牌的权限，允许 Actions 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同一时间只有一个部署任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # 🌟 新增：指定下面所有 run 命令默认在 learn_typing 文件夹下执行
    defaults:
      run:
        working-directory: ./learn_typing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # 🌟 新增：让缓存去对应的文件夹找 package-lock.json
          cache-dependency-path: ./learn_typing/package-lock.json 

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create 404 page for SPA
        run: cp ./dist/index.html ./dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 🌟 修改：打包产物的路径要加上文件夹前缀
          path: './learn_typing/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4